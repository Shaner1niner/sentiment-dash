<!doctype html>
<html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>SETA Research Dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<link rel="stylesheet" href="dashboard_fix26_base.css"/>
</head><body>
<div class="embedShell">
<div class="header"><div class="h1">SETA Research Dashboard</div>
<div class="sub">Combined Overlap remains primary, Engagement stays contextual, and member mode keeps the fuller analytical surface without losing price readability.</div><div class="modeBadge" id="modeBadge">Member Mode</div></div>
<div class="summaryLead" id="summaryLead"></div>
<div class="controls">
  <div class="control" data-control="asset"><label data-label-for="asset">ASSET</label><select id="asset"></select></div>
  <div class="control" data-control="freq"><label data-label-for="freq">FREQUENCY</label><select id="freq"><option value="D">Daily</option><option value="W">Weekly</option></select></div>
  <div class="control" data-control="range"><label data-label-for="range">DISPLAY RANGE</label><select id="range"><option value="1M">1M</option><option value="3M" selected>3M</option><option value="6M">6M</option><option value="YTD">YTD</option><option value="1Y">1Y</option><option value="All">All</option></select></div>
  <div class="control" data-control="priceDisplay"><label data-label-for="priceDisplay">CHART TYPE</label><select id="priceDisplay"><option value="candles">Candles</option><option value="line">Line</option></select></div>
  <div class="control" data-control="scaleMode"><label data-label-for="scaleMode">SCALE MODE</label><select id="scaleMode"><option value="price_overlays" selected>Price + Price Overlays</option><option value="price_only">Price Only</option><option value="all_visible">All Visible Traces</option></select></div>
  <div class="control" data-control="ribbon"><label data-label-for="ribbon">RIBBON</label><select id="ribbon"><option value="none">None</option><option value="price">Price</option><option value="sentiment">Sentiment</option><option value="both">Both</option></select></div>
  <div class="control" data-control="sentRibbon"><label data-label-for="sentRibbon">SENTIMENT RIBBON</label><select id="sentRibbon"><option value="curated">Curated</option><option value="full">Full</option></select></div>
  <div class="control" data-control="regimeLayer"><label data-label-for="regimeLayer">REGIME VISUALS</label><select id="regimeLayer"><option value="on">On</option><option value="off">Off</option></select></div>
  <div class="control" data-control="engagement"><label data-label-for="engagement">ATTENTION</label><select id="engagement"><option value="off">Off</option><option value="context" selected>Context</option><option value="overlay">Overlay Marks</option></select></div>
  <div class="control" data-control="bollinger"><label data-label-for="bollinger">BANDS</label><select id="bollinger"><option value="none">None</option><option value="price">Price</option><option value="sentiment">Sentiment Envelope</option><option value="contextual">Combined Overlap</option><option value="overlap">Canonical Overlap</option><option value="both">All Bands</option></select></div>
  <div class="control" data-control="osc"><label data-label-for="osc">TIMING VIEW</label><select id="osc"><option value="price">Price Only</option><option value="both" selected>Price + Sentiment</option></select></div>
</div>
<div class="meta"><div class="assetTitle" id="assetTitle">BTC · Daily</div><div class="helper" id="helperText">Member view · Combined Overlap primary · Engagement contextual · Timing panes optional.</div></div>
<div class="regimeBar" id="regimeBar"></div>
<div id="chart"></div>
<script>window.DASH_MODE_DEFAULT = "member";</script>
<script src="dashboard_fix26_app.js?v=phase_g_market_tape_011"></script>
</div></body></html>
