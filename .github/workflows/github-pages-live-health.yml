name: GitHub Pages live health check

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * *"
  pull_request:
    paths:
      - ".github/workflows/github-pages-live-health.yml"
      - "index.html"
      - "scripts/smoke_github_pages_live.py"
      - "docs/GITHUB_PAGES_LIVE_HEALTH_CHECK.md"
      - "README.md"

permissions:
  contents: read

jobs:
  live-health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check live GitHub Pages deployment
        run: python scripts/smoke_github_pages_live.py
